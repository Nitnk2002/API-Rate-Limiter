name: Publish API Rate Limiter

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      # ✅ ADD THIS - verify settings.xml was created correctly
      - name: Debug settings.xml
        run: cat ~/.m2/settings.xml

      # ✅ ADD THIS - verify token has correct permissions
      - name: Verify token permissions
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/user/packages

      - name: Publish to GitHub Packages
        run: ./mvnw -B deploy -DskipTests    # ✅ Add -DskipTests first to isolate deploy issue
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379