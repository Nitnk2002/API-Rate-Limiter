name: Publish API Rate Limiter

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    # Spin up a temporary Redis service for the Spring Boot tests
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # CRITICAL: This links to the <id>github</id> in your pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # Change 1: Target the Maven wrapper instead of Gradle
      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      # Change 2: Use mvnw deploy instead of gradlew publish
      - name: Publish to GitHub Packages
        run: ./mvnw -B deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379