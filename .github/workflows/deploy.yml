name: Publish Java Package to GitHub Packages

# Trigger the workflow when a new Release is published, or manually via the Actions tab
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    # Explicitly grant the GITHUB_TOKEN permission to write packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # This must match the <id> in your pom.xml distributionManagement
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # Ensure the Maven wrapper is executable before running it
      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      # Run the deploy phase. The -B flag runs Maven in non-interactive batch mode
      - name: Publish Package
        run: ./mvnw -B deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}